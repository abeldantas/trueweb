<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        margin: 0;
        padding: 14px;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #15171c;
        color: #e8e6e1;
      }
      h1 { font-size: 15px; margin: 0 0 2px; }
      .sub { color: #9a988f; font-size: 11px; margin: 0 0 14px; }
      label { display: block; font-size: 11px; color: #b7b4ab; margin: 12px 0 4px; letter-spacing: 0.02em; }
      input, select {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        border-radius: 6px;
        border: 1px solid #2f333b;
        background: #1d2026;
        color: #e8e6e1;
        font: inherit;
      }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 9px;
        border: 0;
        border-radius: 6px;
        background: #e0a458;
        color: #1a1a1a;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #e8b46e; }
      .modes { display: flex; gap: 6px; margin-top: 6px; }
      .modes button {
        margin: 0;
        background: #23262d;
        color: #e8e6e1;
        font-weight: 500;
      }
      .modes button:hover { background: #2c3038; }
      .status { margin-top: 10px; font-size: 11px; color: #6fae6f; min-height: 14px; }
      .hint { margin-top: 12px; font-size: 11px; color: #8a887f; }
      a { color: #e0a458; }
    </style>
  </head>
  <body>
    <h1>TrueWeb</h1>
    <p class="sub">Put on the glasses. See the web as it is.</p>

    <label for="provider">Provider</label>
    <select id="provider">
      <option value="openai">OpenAI-compatible (OpenAI, OpenRouter, Groq…)</option>
      <option value="anthropic">Anthropic</option>
    </select>

    <label for="baseUrl" id="baseUrlRow">API base URL</label>
    <input id="baseUrl" type="text" placeholder="https://api.openai.com/v1" autocomplete="off" />

    <label for="apiKey">API key</label>
    <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />

    <label for="model">Label model</label>
    <input id="model" type="text" placeholder="gpt-4o-mini" autocomplete="off" list="modelHints" />
    <datalist id="modelHints">
      <option value="gpt-4o-mini"></option>
      <option value="openai/gpt-4o-mini"></option>
      <option value="google/gemini-2.0-flash-001"></option>
      <option value="claude-haiku-4-5"></option>
    </datalist>
    <p class="hint" id="modelHint" style="margin-top:4px;"></p>

    <label for="defaultMode">On every page by default?</label>
    <select id="defaultMode">
      <option value="off">Off — turn on per page</option>
      <option value="on">On — replace titles & thumbnails automatically</option>
    </select>

    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input id="replaceThumbs" type="checkbox" style="width: auto;" />
      Replace YouTube thumbnails with sober text cards
    </label>

    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input id="decorateShorts" type="checkbox" style="width: auto;" />
      Replace Shorts thumbnails (blunt "They Live" style)
    </label>

    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input id="removeAvatars" type="checkbox" style="width: auto;" />
      Remove profile pictures / avatars
    </label>

    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input id="autoDecode" type="checkbox" style="width: auto;" />
      Decode automatically when turned on
    </label>

    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input id="fetchDescriptions" type="checkbox" style="width: auto;" />
      Fetch video descriptions for richer summaries (more bandwidth)
    </label>

    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input id="billboard" type="checkbox" style="width: auto;" />
      Billboard style — ALL CAPS "They Live" cards (harder to read)
    </label>

    <button id="save">Save</button>
    <div class="status" id="status"></div>

    <label>Apply to this tab now</label>
    <div class="modes">
      <button data-mode="off">Off</button>
      <button data-mode="on">On</button>
    </div>

    <p class="hint">
      Glasses on/off: <b>Alt+Shift+Y</b> · Decode: <b>Alt+Shift+D</b><br />
      Titles and thumbnails are rewritten instantly; "Decode" sends them to your chosen LLM for honest summaries.
    </p>
    <p class="hint" style="margin-top: 10px; color: #6f6d65; font-style: italic;">
      Here to chew bubblegum and read clickbait — and all out of bubblegum.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
